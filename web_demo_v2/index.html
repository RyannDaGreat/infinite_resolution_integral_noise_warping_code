<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Infinite Integral Noise Warping — V2 (WebGPU)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #111;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; font-family: monospace; color: #ccc;
        }
        nav {
            position: fixed; top: 0; left: 0; right: 0;
            background: #222; padding: 6px 16px; font-size: 13px;
            display: flex; gap: 16px; align-items: center; z-index: 100;
        }
        nav a { color: #8cf; text-decoration: none; }
        nav a:hover { text-decoration: underline; }
        nav .active { color: #fff; font-weight: bold; }
        #canvas-container {
            position: relative;
            margin-top: 32px;
        }
        #canvas { border: 1px solid #333; cursor: crosshair; }
        #stats {
            position: absolute; top: 4px; left: 4px; right: 4px;
            background: #000a; padding: 4px 8px; font-size: 11px; color: #aaa;
            pointer-events: none; white-space: pre-wrap; line-height: 1.4;
        }
        #controls {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; pointer-events: none; color: #fff8; font-size: 14px; line-height: 1.6;
        }
        #hint {
            position: absolute; bottom: 4px; left: 0; right: 0;
            text-align: center; pointer-events: none; color: #fff4; font-size: 11px;
        }
        #error {
            color: #f44; margin-top: 16px; font-size: 14px;
            white-space: pre-wrap; max-width: 600px; text-align: center;
        }
    </style>
</head>
<body>
    <nav>
        <a href="../web_demo/">V1: WebGL 2 + JS</a>
        <span class="active">V2: WebGPU Compute</span>
    </nav>

    <div id="canvas-container">
        <canvas id="canvas" width="512" height="512"></canvas>
        <div id="stats">Initializing WebGPU...</div>
        <div id="controls">
            Click to capture mouse<br>
            WASD — move | E/Q — up/down<br>
            1-5 — display modes | ESC — release mouse
        </div>
        <div id="hint">ESC to release | 1-5 modes</div>
    </div>
    <div id="error"></div>

    <script src="https://cdn.jsdelivr.net/npm/gl-matrix@3.4.3/gl-matrix-min.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
