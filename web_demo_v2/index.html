<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Infinite Integral Noise Warping — V2 (WebGPU)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #111;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; font-family: monospace; color: #ccc;
        }
        nav {
            position: fixed; top: 0; left: 0; right: 0;
            background: #222; padding: 6px 16px; font-size: 13px;
            display: flex; gap: 8px; align-items: center; z-index: 100;
            flex-wrap: wrap;
        }
        nav a { color: #8cf; text-decoration: none; }
        nav a:hover { text-decoration: underline; }
        nav .active { color: #fff; font-weight: bold; }
        nav .sep { color: #555; }
        nav button {
            background: #444; color: #ccc; border: 1px solid #666; padding: 2px 10px;
            cursor: pointer; font-family: monospace; font-size: 12px; border-radius: 3px;
        }
        nav button:hover { background: #555; }
        nav button.on { background: #26a; color: #fff; border-color: #48c; }
        #canvas-container {
            position: relative;
            margin-top: 32px;
        }
        /* No border/padding on canvas — any inward border makes the CSS size differ from
           the render resolution, causing pixel misalignment (missed scanlines, ugly moiré). */
        #canvas { outline: 1px solid #333; cursor: crosshair; }
        .overlay {
            position: absolute; pointer-events: none;
            background: #000a; padding: 4px 8px; color: #aaa;
            font-size: 11px; line-height: 1.4;
        }
        #stats { top: 4px; left: 4px; right: 4px; white-space: pre-wrap; }
        #controls {
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; font-size: 14px; line-height: 1.6; padding: 12px 20px;
            border-radius: 6px;
        }
        #hint { bottom: 4px; left: 4px; right: 4px; text-align: center; }
        #error {
            color: #f44; margin-top: 16px; font-size: 14px;
            white-space: pre-wrap; max-width: 600px; text-align: center;
        }
    </style>
</head>
<body>
    <nav>
        <a href="../web_demo/">V1: WebGL 2 + JS</a>
        <span class="active">V2: WebGPU Compute</span>
        <span class="sep">|</span>
        <button id="resBtn" title="Cycle render resolution: 2048, 1024, 512, 256">[P] 2048</button>
        <button id="blueNoiseBtn" title="Toggle blue noise post-processing">[B] Blue: OFF</button>
        <button id="bnItersBtn" title="Cycle blue noise iterations: 2, 5, 10. Fewer = faster, less blue.">[N] BN×10</button>
        <button id="greyBtn" title="Toggle greyscale display — show channel 0 only">[G] Grey: OFF</button>
        <button id="uniformBtn" title="Toggle Gaussian→Uniform display mapping via normal CDF">[U] Uniform: ON</button>
        <button id="retinaBtn" title="Toggle retina/HiDPI scaling">[T] Retina: ON</button>
        <button id="interpBtn" title="Toggle canvas CSS interpolation: bilinear vs nearest-neighbor">[I] Interp: Nearest</button>
        <button id="roundBtn" title="Motion rounding: None (fractional), Round All (snap to whole pixels), Round >1 (only round large motion)">[O] Round: None</button>
        <button id="threshBtn" title="Toggle threshold visualization — shows spatial distribution of extreme noise values">[H] Thresh: OFF</button>
        <input type="range" id="threshSlider" min="0" max="1000" value="500" disabled title="Drag left for bottom tail, right for top tail" style="width: 120px; vertical-align: middle; accent-color: #48c;">
        <span id="threshLabel" style="font-size: 11px; min-width: 50px; display: inline-block;"></span>
        <button id="resetBtn" title="Reset all settings to defaults">Reset</button>
    </nav>

    <div id="canvas-container">
        <canvas id="canvas"></canvas>
        <div id="stats" class="overlay">Initializing WebGPU...</div>
        <div id="controls" class="overlay">
            Click to capture mouse<br>
            WASD — move | E/Q — up/down<br>
            1-5 — display modes | ESC — release mouse<br>
            Space — pause
        </div>
        <div id="hint" class="overlay">ESC release | 1-5 modes | B blue | N iters | G grey | U uniform | H thresh | O round | P res | T retina | I interp | Space pause</div>
    </div>
    <div id="error"></div>

    <script src="https://cdn.jsdelivr.net/npm/gl-matrix@3.4.3/gl-matrix-min.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
